name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: market
          POSTGRES_PASSWORD: market
          POSTGRES_DB: market_trader
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U market -d market_trader"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      MT_DATABASE_URL: postgresql+psycopg://market:market@localhost:5432/market_trader
      DATABASE_URL: postgresql+psycopg://market:market@localhost:5432/market_trader
      TEST_DATABASE_URL: postgresql+psycopg://market:market@localhost:5432/market_trader

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check src tests scripts

      - name: Black (format check)
        run: uv run black --check src tests scripts

      - name: Pyright (types)
        run: uv run pyright

      - name: Alembic migrations apply
        run: uv run alembic upgrade head

      - name: Tests (incl. Postgres integration)
        run: uv run pytest
