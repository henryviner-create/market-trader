# Local infrastructure. Boot the database with: docker compose up -d db
# Phase 7 extends this file with Redis, Prefect, Prometheus, and Grafana.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market_trader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market_trader"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

volumes:
  pgdata:
